name: news-summary
description: 每日新闻总结生成工具，支持与昨日新闻进行对比分析
version: "1.0.0"

template:
  header:
    date: "[具体日期]"
    weekday: "[星期几]"
    generatedAt: "[具体时间]"

  section1_overview:
    title: "一、今日新闻概览"
    fields:
      totalNews: "新闻总条数：[具体数字]条（较昨日[增加/减少][具体数字]条）"
      hotTopics: "核心热点领域：[列出2-3个今日最集中的新闻领域，如'科技·AI大模型更新''国际·中东局势']"
      keywords: "今日关键词：[提取3-5个高频关键词，如'降准降息''SpaceX发射''暑期档电影']"

  section2_categories:
    title: "二、分领域新闻总结（按热度排序）"
    categoryTemplate:
      name: "[领域名称，如：国内时政、科技·互联网、国际新闻、财经·股市]"
      count: "共[具体数字]条，较昨日[增加/减少][具体数字]条"
      headline:
        title: "头条新闻：[标题]"
        content: "核心内容：[1-2句话概括核心事件]"
        yesterdayComparison: "昨日对比：[说明与昨日相关事件的关联]"
      otherNews:
        title: "其他重点新闻（每条1句话）："
        items:
          - "[新闻标题]：[核心内容]"

  section3_yesterday_progress:
    title: "三、昨日新闻今日进展（跟踪类）"
    itemTemplate:
      yesterdayTitle: "[昨日头条标题]"
      todayProgress: "[今日最新进展，如'昨日该事件，今日最新进展']"

  section4_comparison:
    title: "四、今日新闻与昨日核心差异总结"
    table:
      headers: ["对比维度", "今日重点", "昨日重点", "变化说明"]
      rows:
        - dimension: "热点领域"
          today: "科技（32%）、国内时政（25%）"
          yesterday: "国际（30%）、财经（28%）"
          change: "今日科技领域新闻占比上升10%，因AI大模型集中发布"
        - dimension: "核心事件"
          today: "国务院民营经济新政"
          yesterday: "美联储议息会议"
          change: "从'国际宏观'转向'国内政策落地'"
        - dimension: "情绪倾向"
          today: "中性偏积极（政策利好为主）"
          yesterday: "中性偏谨慎（市场波动较大）"
          change: "今日国内政策利好带动市场情绪回暖"

  section5_tomorrow_focus:
    title: "五、明日关注重点（基于今日新闻预判）"
    items:
      - "[关注点1，如'国务院民营经济新政具体实施细则将如何落地']"
      - "[关注点2，如'Track台风'杜苏芮'登陆后对东南沿海的影响']"
      - "[关注点3，如'OpenAI GPT-4o mini模型开发者实测表现']"

usage:
  dataCollection:
    method: "通过新闻爬虫（如Python+BeautifulSoup）或RSS订阅（如Inoreader）获取原始新闻"
    processing: "按领域分类后统计条数"
  yesterdayComparison:
    requirement: "需保存前一日新闻总结，提取'头条''核心事件'等关键信息"
    comparisonTypes:
      - "政策从'征求意见'到'正式发布'"
      - "事件从'预告'到'正式落地'"
      - "数据从'预期'到'实际公布'"
  automation:
    aiSummary: "可结合AI工具（如ChatGPT）生成'核心内容'摘要"
    tools: "用Excel或Notion制作'对比表格'，提升效率"

customization:
  flexibleCategories:
    description: "根据需求增减领域"
    examples: ["娱乐", "体育", "科技", "财经"]
  additionalDimensions:
    - "舆情热度"
    - "来源分布"
